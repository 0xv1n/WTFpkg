name: Bug Report
description: Something broken on the site
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: "Describe the bug. Screenshots help."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: "How can we reproduce this?"
      value: |
        1. Go to '...'
        2. Click on '...'
        3. See error

  - type: input
    id: browser
    attributes:
      label: Browser / OS
      placeholder: "e.g. Chrome 120 on Windows 11"
